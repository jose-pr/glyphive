[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "glyphive-ocrmodel-courier"
version = "0.1.0"
description = "Opt-in glyphive OCR model fine-tuned for Nimbus Mono PS (base16g channel)."
readme = "README.md"
requires-python = ">=3.9"
license = "Apache-2.0"
keywords = ["glyphive", "ocr", "tesseract", "traineddata", "courier"]
dependencies = [
    # Registers against the core provider registry; needs the OCR extra at runtime.
    "glyphive",
    "pytesseract",
]

# The provider self-registers when glyphive discovers installed plugins.
[project.entry-points."glyphive.ocr_providers"]
tesseract-glyphive-courier = "glyphive_ocrmodel_courier.provider:CourierGlyphiveProvider"

[tool.hatch.build.targets.sdist]
include = ["src/glyphive_ocrmodel_courier"]

[tool.hatch.build.targets.wheel]
packages = ["src/glyphive_ocrmodel_courier"]
# The trained model ships as package data (added by the release build).
artifacts = ["src/glyphive_ocrmodel_courier/glyphivecourier.traineddata"]
