[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "glyphive-ocrmodel-ocrb"
version = "0.1.0"
description = "Opt-in glyphive OCR model fine-tuned for OCR-B (base16c channel)."
readme = "README.md"
requires-python = ">=3.9"
license = "Apache-2.0"
keywords = ["glyphive", "ocr", "tesseract", "traineddata", "ocrb"]
dependencies = [
    # Registers against the core provider registry; needs the OCR extra at runtime.
    "glyphive",
    "pytesseract",
]

# The provider self-registers when glyphive discovers installed plugins.
[project.entry-points."glyphive.ocr_providers"]
tesseract-glyphive-ocrb = "glyphive_ocrmodel_ocrb.provider:OcrbGlyphiveProvider"

[tool.hatch.build.targets.sdist]
include = ["src/glyphive_ocrmodel_ocrb"]

[tool.hatch.build.targets.wheel]
packages = ["src/glyphive_ocrmodel_ocrb"]
# The trained model ships as package data (added by the release build).
artifacts = ["src/glyphive_ocrmodel_ocrb/glyphiveocrb.traineddata"]
