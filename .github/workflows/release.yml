name: Release

# Runs when a version tag (e.g. v1.0.0, v1.0.0-rc.1) is pushed. Not wired to
# push/PR events on branches -- this is a release gate, not general CI.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    name: Test (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.9"
          - os: ubuntu-latest
            python-version: "3.14"
          - os: windows-latest
            python-version: "3.9"
          - os: windows-latest
            python-version: "3.14"
          - os: macos-latest
            python-version: "3.9"
          - os: macos-latest
            python-version: "3.14"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with all extras
        run: python -m pip install -e ".[all,dev]"
      - name: Run tests
        run: python -m pytest -q

  build:
    name: Build Python distributions
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install build tooling
        run: python -m pip install --upgrade build twine
      - name: Build sdist and wheel
        run: python -m build --sdist --wheel --outdir dist
      - name: Validate distributions
        run: python -m twine check dist/*
      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: |
            dist/*.whl
            dist/*.tar.gz

  build-standalone:
    name: Build standalone zipapp
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install zipapp build dependency
        run: python -m pip install "duho>=0.2.0"
      - name: Build standalone pyz
        run: python package.py --out dist/glyphive.pyz
      - name: Smoke test standalone pyz
        run: python dist/glyphive.pyz --help
      - name: Upload standalone zipapp
        uses: actions/upload-artifact@v4
        with:
          name: standalone-pyz
          path: dist/glyphive.pyz

  docs-build:
    name: Build documentation site
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: actions/configure-pages@v5
      - name: Install package with docs tooling
        run: python -m pip install -e ".[all,dev,docs]"
      - name: Build docs
        run: mkdocs build --strict
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  docs-deploy:
    name: Deploy documentation to GitHub Pages
    needs: [build, docs-build]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  github-release:
    name: Create GitHub Release
    needs: [build, build-standalone, docs-deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/
      - name: Download standalone zipapp
        uses: actions/download-artifact@v4
        with:
          name: standalone-pyz
          path: dist/
      - name: Extract CHANGELOG.md section for this tag
        shell: python
        run: |
          import pathlib
          import re
          import sys

          tag = "${{ github.ref_name }}"
          version = tag[1:] if tag.startswith("v") else tag

          changelog = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          match = re.search(
              rf"^## \[{re.escape(version)}\][^\n]*\n(.*?)(?=^## \[|^\[[^\]]+\]:\s|\Z)",
              changelog,
              re.DOTALL | re.MULTILINE,
          )
          if not match:
              sys.exit(f"No CHANGELOG.md section found for version {version!r}")
          pathlib.Path("release_notes.md").write_text(
              match.group(1).strip() + "\n",
              encoding="utf-8",
          )
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: release_notes.md

  publish-pypi:
    name: Publish to PyPI
    needs: github-release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/glyphive/
    permissions:
      id-token: write
    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
